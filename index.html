<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC Network | Sales Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* Sidebar Style */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--primary-color);
            color: white;
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.1);
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            border-radius: 0;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent-color);
        }

        .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.1);
            border-left: 4px solid var(--accent-color);
        }

        .nav-link i {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        /* Main Content Style */
        #main-wrapper {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .top-navbar {
            background: white;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #content-area {
            padding: 30px;
        }

        /* Profile Section in Sidebar */
        .sidebar-footer {
            margin-top: auto;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            font-size: 0.85rem;
        }

        /* Loading Overlay */
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        @media (max-width: 768px) {
            #sidebar { margin-left: calc(var(--sidebar-width) * -1); }
            #main-wrapper { margin-left: 0; }
            #sidebar.active { margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="mb-0 fw-bold text-info">NC NETWORK</h4>
            <small class="text-white-50">Sales System v2.0</small>
        </div>
        
        <div class="nav flex-column mt-3">
            <a href="#" class="nav-link active" onclick="loadPage('dashboard', this)">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="#" class="nav-link" onclick="loadPage('company-register', this)">
                <i class="bi bi-building-add"></i> New Company Register
            </a>
            <hr class="mx-3 text-white-50">
            <a href="#" class="nav-link" onclick="loadPage('quotation-single', this)">
                <i class="bi bi-file-earmark-text"></i> Single Service QT
            </a>
            <a href="#" class="nav-link" onclick="loadPage('quotation-multi', this)">
                <i class="bi bi-files"></i> Multi Service QT
            </a>
            <hr class="mx-3 text-white-50">
            <a href="#" class="nav-link" onclick="loadPage('export-center', this)">
                <i class="bi bi-cloud-arrow-down"></i> Export Quotation
            </a>
            <a href="#" class="nav-link" onclick="loadPage('invoice-checking', this)">
                <i class="bi bi-check2-square"></i> Invoice Checking
            </a>
        </div>

        <div class="sidebar-footer text-center">
            <div class="d-flex align-items-center justify-content-center">
                <i class="bi bi-person-circle fs-4 me-2 text-info"></i>
                <div class="text-start">
                    <div class="fw-bold">Sales Manager</div>
                    <div class="small text-white-50">NC Network Asia</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-wrapper">
        <nav class="top-navbar d-flex justify-content-between align-items-center">
            <button class="btn btn-light d-md-none" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <h5 class="mb-0 fw-bold text-secondary" id="page-title">Dashboard</h5>
            <div id="current-time" class="text-muted small"></div>
        </nav>

        <div id="page-loader">
            <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div id="content-area">
            <!-- Content will be loaded here -->
            <div class="text-center mt-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2 text-muted">กำลังเตรียมระบบ...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // URL ของ Google Apps Script Web App ของคุณ
        const CONFIG = {
            WEB_APP_URL: "YOUR_APPS_SCRIPT_URL_HERE", // เปลี่ยนเป็น URL ของคุณ
            GITHUB_BASE_URL: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : '/YOUR_REPO_NAME' 
        };

        // เริ่มต้นโหลดหน้า Dashboard เมื่อเปิดเว็บ
        window.onload = () => {
            loadPage('dashboard', document.querySelector('.nav-link.active'));
            updateTime();
            setInterval(updateTime, 1000);
        };

        /**
         * ฟังก์ชันโหลดเนื้อหาหน้าย่อยลงใน Content Area
         * @param {string} pageName - ชื่อไฟล์ HTML (ไม่รวมนามสกุล)
         * @param {HTMLElement} element - ลิงก์ที่ถูกคลิก
         */
        async function loadPage(pageName, element) {
            const contentArea = document.getElementById('content-area');
            const pageLoader = document.getElementById('page-loader');
            const pageTitle = document.getElementById('page-title');
            
            // แสดงสถานะ Loading
            pageLoader.style.display = 'flex';
            
            // อัปเดต UI Sidebar
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            if(element) element.classList.add('active');
            
            // อัปเดต Title
            pageTitle.innerText = element ? element.innerText.trim() : pageName;

            try {
                // พยายามดึงไฟล์ HTML จาก GitHub Pages
                const response = await fetch(`${pageName}.html`);
                if (!response.ok) throw new Error('Page not found');
                
                const html = await response.text();
                contentArea.innerHTML = html;

                // ตรวจสอบว่าในหน้าที่โหลดมามีสคริปต์ที่ต้องรันใหม่ไหม
                executeScripts(contentArea);

            } catch (error) {
                contentArea.innerHTML = `
                    <div class="alert alert-danger shadow-sm">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <strong>ไม่สามารถโหลดหน้าได้:</strong> ไฟล์ ${pageName}.html อาจยังไม่ได้อัปโหลดขึ้น GitHub
                    </div>
                `;
                console.error('Error loading page:', error);
            } finally {
                pageLoader.style.display = 'none';
            }
        }

        // ฟังก์ชันช่วยให้สคริปต์ในไฟล์ที่โหลดมาทำงานได้
        function executeScripts(container) {
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString('th-TH', { 
                dateStyle: 'medium', 
                timeStyle: 'short' 
            });
        }
    </script>
</body>
</html>
